# ~/.config/hypr/hyprlock.conf

background {
    monitor =
    path = /home/wizord/Images/fight-jedi-sith.jpg
    blur_passes = 2
    contrast = 1.0
    brightness = 0.8
    vibrancy = 0.2
}

# Reloj grande arriba
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    color = rgba(255, 255, 255, 0.9)
    position = 0, 200
    halign = center
    valign = center
}

# Fecha debajo del reloj
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = rgba(255, 255, 255, 0.7)
    position = 0, 120
    halign = center
    valign = center
}

# Batería (encima de contraseña)
label {
    monitor =
    text = cmd[update:5000] echo "  $(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null || echo "AC")%"
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    color = rgba(255, 255, 255, 0.8)
    position = 0, 20
    halign = center
    valign = center
}

# Campo de contraseña
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(40, 200, 64, 0.7)
    inner_color = rgba(30, 30, 30, 0.8)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = false
    placeholder_text = <i>Contraseña...</i>
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}
